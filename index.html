<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2人対戦エアホッケー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:none; user-select:none; -webkit-user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0e14; font-family:'BIZ UDPGothic', sans-serif; }
  #canvas-container { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; }

  .score-panel {
    position:fixed; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:14px;
    padding:8px 20px; border-radius:16px;
    background:rgba(10,14,20,0.55); backdrop-filter:blur(6px);
    color:#eaf6ff; z-index:10; pointer-events:none;
  }
  #panel-top { top:14px; transform:translateX(-50%) rotate(180deg); }
  #panel-bottom { bottom:14px; }
  .score-label { font-size:13px; opacity:0.75; letter-spacing:0.05em; }
  .score-value { font-size:34px; font-weight:700; min-width:38px; text-align:center; }
  .score-value.top-color { color:#ff8a6b; }
  .score-value.bottom-color { color:#6bc7ff; }

  #center-hint {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:rgba(234,246,255,0.18); font-size:12px; letter-spacing:0.3em;
    pointer-events:none; z-index:5; white-space:nowrap;
  }

  #restart-btn {
    position:fixed; top:14px; right:14px; z-index:20;
    min-width:44px; min-height:44px; padding:0 16px;
    border:none; border-radius:12px;
    background:rgba(255,255,255,0.12); color:#eaf6ff;
    font-family:'BIZ UDPGothic', sans-serif; font-size:14px;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
  }
  #restart-btn:active { background:rgba(255,255,255,0.28); }

  #overlay {
    position:fixed; inset:0; z-index:30; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:22px;
    background:rgba(4,6,10,0.72); backdrop-filter:blur(4px);
  }
  #overlay.show { display:flex; }
  .win-banner { color:#eaf6ff; text-align:center; font-weight:700; }
  #win-top { font-size:26px; transform:rotate(180deg); color:#ff8a6b; }
  #win-bottom { font-size:26px; color:#6bc7ff; }
  #rematch-btn {
    min-width:160px; min-height:52px; padding:0 28px;
    border:none; border-radius:26px; font-size:18px; font-weight:700;
    font-family:'BIZ UDPGothic', sans-serif;
    background:linear-gradient(135deg,#6bc7ff,#ff8a6b); color:#0a0e14;
  }
  #rematch-btn:active { filter:brightness(0.88); }

  #serve-banner {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#eaf6ff; font-size:20px; font-weight:700; letter-spacing:0.1em;
    z-index:15; pointer-events:none; opacity:0; transition:opacity 0.25s;
    text-shadow:0 2px 12px rgba(0,0,0,0.6);
  }
  #serve-banner.show { opacity:1; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="center-hint">FIRST TO 7</div>

<div class="score-panel" id="panel-top">
  <span class="score-label">TOP</span>
  <span class="score-value top-color" id="score-top">0</span>
</div>
<div class="score-panel" id="panel-bottom">
  <span class="score-label">BOTTOM</span>
  <span class="score-value bottom-color" id="score-bottom">0</span>
</div>

<div id="serve-banner"></div>

<button id="restart-btn">リスタート</button>

<div id="overlay">
  <div class="win-banner" id="win-top">WIN!</div>
  <button id="rematch-btn">もう一回</button>
  <div class="win-banner" id="win-bottom">WIN!</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

/* ========================================================================
   設定値
   ======================================================================== */
const TABLE_HALF_W = 3.0;      // X: -3 〜 3
const TABLE_HALF_L = 5.0;      // Z: -5 〜 5 (Z+ = BOTTOM側, Z- = TOP側)
const WALL_T = 0.3;
const WALL_H = 0.5;
const GOAL_HALF_W = 1.15;
const GOAL_TRIGGER_Z = TABLE_HALF_L + 0.55;
const MALLET_R = 0.55;
const MALLET_H = 0.28;
const PUCK_R = 0.36;
const PUCK_H = 0.16;
const TABLE_Y = 0.0;
const MALLET_MAX_SPEED = 14;   // units/sec
const WIN_SCORE = 7;

/* ========================================================================
   Three.js 基本セットアップ
   ======================================================================== */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e14);
scene.fog = new THREE.Fog(0x0a0e14, 14, 22);

const aspect = window.innerWidth / window.innerHeight;
const viewSize = TABLE_HALF_L + 2.2;
const camera = new THREE.OrthographicCamera(
  -viewSize * aspect, viewSize * aspect, viewSize, -viewSize, 0.1, 50
);
camera.up.set(0, 0, -1);
camera.position.set(0, 14, 0.0001);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// ライト
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(4, 10, -3);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
scene.add(dirLight);

// テーブル面
const tableGeo = new THREE.PlaneGeometry(TABLE_HALF_W * 2, TABLE_HALF_L * 2, 20, 20);
const tableMat = new THREE.MeshStandardMaterial({ color: 0x0e2a3d, roughness: 0.35, metalness: 0.1 });
const tableMesh = new THREE.Mesh(tableGeo, tableMat);
tableMesh.rotation.x = -Math.PI / 2;
tableMesh.receiveShadow = true;
scene.add(tableMesh);

// センターライン
const centerLineGeo = new THREE.PlaneGeometry(TABLE_HALF_W * 2, 0.05);
const centerLineMat = new THREE.MeshBasicMaterial({ color: 0x3a6a85 });
const centerLine = new THREE.Mesh(centerLineGeo, centerLineMat);
centerLine.rotation.x = -Math.PI / 2;
centerLine.position.set(0, 0.01, 0);
scene.add(centerLine);

// センターサークル
const circleGeo = new THREE.RingGeometry(1.0, 1.06, 48);
const circleMat = new THREE.MeshBasicMaterial({ color: 0x3a6a85, side: THREE.DoubleSide });
const centerCircle = new THREE.Mesh(circleGeo, circleMat);
centerCircle.rotation.x = -Math.PI / 2;
centerCircle.position.set(0, 0.011, 0);
scene.add(centerCircle);

// ゴールゾーン表示
function makeGoalZoneMesh(color) {
  const g = new THREE.PlaneGeometry(GOAL_HALF_W * 2, 0.5);
  const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(g, m);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = 0.012;
  return mesh;
}
const goalZoneBottom = makeGoalZoneMesh(0x6bc7ff);
goalZoneBottom.position.z = TABLE_HALF_L - 0.25;
scene.add(goalZoneBottom);
const goalZoneTop = makeGoalZoneMesh(0xff8a6b);
goalZoneTop.position.z = -TABLE_HALF_L + 0.25;
scene.add(goalZoneTop);

// 壁の見た目
function addWallMesh(x, z, w, d) {
  const geo = new THREE.BoxGeometry(w, WALL_H, d);
  const mat = new THREE.MeshStandardMaterial({ color: 0x1b3a4d, roughness: 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, WALL_H / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
}
// 左右の長辺
addWallMesh(-(TABLE_HALF_W + WALL_T / 2), 0, WALL_T, TABLE_HALF_L * 2 + WALL_T * 2);
addWallMesh((TABLE_HALF_W + WALL_T / 2), 0, WALL_T, TABLE_HALF_L * 2 + WALL_T * 2);
// 上下の短辺（ゴール開口部を残す2分割）
const endSegW = TABLE_HALF_W - GOAL_HALF_W;
[1, -1].forEach(sideZ => {
  [1, -1].forEach(sideX => {
    const x = sideX * (GOAL_HALF_W + endSegW / 2);
    const z = sideZ * (TABLE_HALF_L + WALL_T / 2);
    addWallMesh(x, z, endSegW, WALL_T);
  });
});

// マレット・パックの見た目
function makeMalletMesh(color) {
  const geo = new THREE.CylinderGeometry(MALLET_R, MALLET_R, MALLET_H, 32);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.2, emissive: color, emissiveIntensity: 0.15 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}
const malletBottomMesh = makeMalletMesh(0x6bc7ff);
scene.add(malletBottomMesh);
const malletTopMesh = makeMalletMesh(0xff8a6b);
scene.add(malletTopMesh);

const puckGeo = new THREE.CylinderGeometry(PUCK_R, PUCK_R, PUCK_H, 32);
const puckMat = new THREE.MeshStandardMaterial({ color: 0xf2f6f8, roughness: 0.25, metalness: 0.1 });
const puckMesh = new THREE.Mesh(puckGeo, puckMat);
puckMesh.castShadow = true;
puckMesh.receiveShadow = true;
scene.add(puckMesh);

/* ========================================================================
   cannon-es 物理セットアップ（XZ平面の2D物理として扱う）
   ======================================================================== */
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, 0, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;

const puckMaterial = new CANNON.Material('puck');
const malletMaterial = new CANNON.Material('mallet');
const wallMaterial = new CANNON.Material('wall');

world.addContactMaterial(new CANNON.ContactMaterial(puckMaterial, wallMaterial, {
  friction: 0.0, restitution: 0.92,
}));
world.addContactMaterial(new CANNON.ContactMaterial(puckMaterial, malletMaterial, {
  friction: 0.0, restitution: 0.95,
}));

function addWallBody(x, z, w, d) {
  const body = new CANNON.Body({ mass: 0, material: wallMaterial });
  body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, WALL_H, d / 2)));
  body.position.set(x, TABLE_Y, z);
  world.addBody(body);
}
addWallBody(-(TABLE_HALF_W + WALL_T / 2), 0, WALL_T, TABLE_HALF_L * 2 + WALL_T * 2);
addWallBody((TABLE_HALF_W + WALL_T / 2), 0, WALL_T, TABLE_HALF_L * 2 + WALL_T * 2);
[1, -1].forEach(sideZ => {
  [1, -1].forEach(sideX => {
    const x = sideX * (GOAL_HALF_W + endSegW / 2);
    const z = sideZ * (TABLE_HALF_L + WALL_T / 2);
    addWallBody(x, z, endSegW, WALL_T);
  });
});

// パック
const puckBody = new CANNON.Body({
  mass: 0.17,
  material: puckMaterial,
  linearDamping: 0.06,
  angularDamping: 0.9,
});
puckBody.addShape(new CANNON.Cylinder(PUCK_R, PUCK_R, PUCK_H, 20));
puckBody.position.set(0, TABLE_Y, 0);
world.addBody(puckBody);

// マレット（キネマティック：タッチで直接動かす）
function makeMalletBody() {
  const body = new CANNON.Body({
    mass: 0,
    type: CANNON.Body.KINEMATIC,
    material: malletMaterial,
  });
  body.addShape(new CANNON.Cylinder(MALLET_R, MALLET_R, MALLET_H, 20));
  body.position.set(0, TABLE_Y, 0);
  world.addBody(body);
  return body;
}
const malletBottomBody = makeMalletBody();
malletBottomBody.position.set(0, TABLE_Y, TABLE_HALF_L - 1.0);
const malletTopBody = makeMalletBody();
malletTopBody.position.set(0, TABLE_Y, -(TABLE_HALF_L - 1.0));

/* ========================================================================
   Web Audio（効果音）
   ======================================================================== */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type, gainPeak, delay = 0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  const t0 = audioCtx.currentTime + delay;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(gainPeak, t0 + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}
function playHit(intensity) {
  const f = 260 + Math.min(intensity, 12) * 22;
  playTone(f, 0.09, 'triangle', Math.min(0.25 + intensity * 0.02, 0.5));
}
function playWallBounce() {
  playTone(180, 0.05, 'square', 0.12);
}
function playGoal() {
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.22, 'sine', 0.3, i * 0.09));
}
function playWin() {
  [784, 659, 880, 1175].forEach((f, i) => playTone(f, 0.3, 'sine', 0.32, i * 0.13));
}

/* ========================================================================
   タッチ操作（左右2本指を screen上半分/下半分 で振り分け）
   世界座標: Z+ = 画面下側(BOTTOM), Z- = 画面上側(TOP)
   ======================================================================== */
const raycaster = new THREE.Raycaster();
const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -TABLE_Y);
const touchTargets = { top: null, bottom: null }; // {touchId, worldX, worldZ}

function screenToWorld(clientX, clientY) {
  const ndc = new THREE.Vector2(
    (clientX / window.innerWidth) * 2 - 1,
    -(clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  const hit = new THREE.Vector3();
  raycaster.ray.intersectPlane(tablePlane, hit);
  return hit;
}

function clampMallet(player, x, z) {
  const cx = Math.max(-TABLE_HALF_W + MALLET_R, Math.min(TABLE_HALF_W - MALLET_R, x));
  let cz;
  if (player === 'bottom') {
    cz = Math.max(MALLET_R * 0.5, Math.min(TABLE_HALF_L - MALLET_R, z));
  } else {
    cz = Math.min(-MALLET_R * 0.5, Math.max(-(TABLE_HALF_L - MALLET_R), z));
  }
  return { x: cx, z: cz };
}

function handleTouchPoint(clientX, clientY, touchId, phase) {
  const player = clientY < window.innerHeight / 2 ? 'top' : 'bottom';
  if (phase === 'start' || phase === 'move') {
    const world = screenToWorld(clientX, clientY);
    const c = clampMallet(player, world.x, world.z);
    touchTargets[player] = { touchId, x: c.x, z: c.z };
  } else if (phase === 'end') {
    if (touchTargets[player] && touchTargets[player].touchId === touchId) {
      touchTargets[player] = null;
    }
  }
}

function onTouchStart(e) {
  ensureAudio();
  for (const t of e.changedTouches) handleTouchPoint(t.clientX, t.clientY, t.identifier, 'start');
}
function onTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) handleTouchPoint(t.clientX, t.clientY, t.identifier, 'move');
}
function onTouchEnd(e) {
  for (const t of e.changedTouches) handleTouchPoint(t.clientX, t.clientY, t.identifier, 'end');
}
renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: true });
renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: true });
renderer.domElement.addEventListener('touchcancel', onTouchEnd, { passive: true });

// マウス操作（PCでのテスト用フォールバック：クリック位置の半分で判定）
let mouseDown = false;
renderer.domElement.addEventListener('mousedown', (e) => {
  ensureAudio();
  mouseDown = true;
  handleTouchPoint(e.clientX, e.clientY, 'mouse', 'start');
});
window.addEventListener('mousemove', (e) => {
  if (mouseDown) handleTouchPoint(e.clientX, e.clientY, 'mouse', 'move');
});
window.addEventListener('mouseup', (e) => {
  mouseDown = false;
  handleTouchPoint(e.clientX, e.clientY, 'mouse', 'end');
});

// ダブルタップズーム防止
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener('gesturestart', (e) => e.preventDefault());

/* ========================================================================
   ゲーム状態
   ======================================================================== */
const scoreEl = { top: document.getElementById('score-top'), bottom: document.getElementById('score-bottom') };
const overlay = document.getElementById('overlay');
const winTopEl = document.getElementById('win-top');
const winBottomEl = document.getElementById('win-bottom');
const serveBanner = document.getElementById('serve-banner');

let score = { top: 0, bottom: 0 };
let gameOver = false;
let puckFrozen = true;
let serveTimer = 0;

function showServeBanner(text, ms) {
  serveBanner.textContent = text;
  serveBanner.classList.add('show');
  setTimeout(() => serveBanner.classList.remove('show'), ms);
}

function resetPuck(directionSign) {
  puckBody.position.set(0, TABLE_Y, 0);
  puckBody.velocity.set(0, 0, 0);
  puckBody.angularVelocity.set(0, 0, 0);
  puckFrozen = true;
  serveTimer = 0.9;
  window.__pendingServeDir = directionSign;
}

function resetGame() {
  score = { top: 0, bottom: 0 };
  gameOver = false;
  overlay.classList.remove('show');
  scoreEl.top.textContent = '0';
  scoreEl.bottom.textContent = '0';
  malletBottomBody.position.set(0, TABLE_Y, TABLE_HALF_L - 1.0);
  malletTopBody.position.set(0, TABLE_Y, -(TABLE_HALF_L - 1.0));
  resetPuck(Math.random() < 0.5 ? 1 : -1);
  showServeBanner('スタート！', 1200);
}

function onGoal(scoringPlayer) {
  score[scoringPlayer]++;
  scoreEl[scoringPlayer].textContent = String(score[scoringPlayer]);
  playGoal();
  if (score[scoringPlayer] >= WIN_SCORE) {
    gameOver = true;
    winTopEl.style.display = scoringPlayer === 'top' ? 'block' : 'none';
    winBottomEl.style.display = scoringPlayer === 'bottom' ? 'block' : 'none';
    winTopEl.textContent = 'TOP WIN!';
    winBottomEl.textContent = 'BOTTOM WIN!';
    overlay.classList.add('show');
    playWin();
  } else {
    // 得点された側にサーブ権
    resetPuck(scoringPlayer === 'top' ? -1 : 1);
    showServeBanner(scoringPlayer === 'top' ? 'TOP の得点！' : 'BOTTOM の得点！', 1100);
  }
}

document.getElementById('restart-btn').addEventListener('click', resetGame);
document.getElementById('rematch-btn').addEventListener('click', resetGame);

/* ========================================================================
   メインループ
   ======================================================================== */
const clock = new THREE.Clock();
const tmpVec = new THREE.Vector3();

function updateMallet(body, player, dt) {
  const t = touchTargets[player];
  let targetX, targetZ;
  if (t) {
    targetX = t.x; targetZ = t.z;
  } else {
    // 指を離したら現在地でゆっくり減速停止
    targetX = body.position.x + body.velocity.x * dt * 0.5;
    targetZ = body.position.z + body.velocity.z * dt * 0.5;
    const c = clampMallet(player, targetX, targetZ);
    targetX = c.x; targetZ = c.z;
  }
  const dx = targetX - body.position.x;
  const dz = targetZ - body.position.z;
  const dist = Math.sqrt(dx * dx + dz * dz);
  const maxStep = MALLET_MAX_SPEED * dt;
  let moveX, moveZ;
  if (dist > maxStep && dist > 0.00001) {
    moveX = (dx / dist) * maxStep;
    moveZ = (dz / dist) * maxStep;
  } else {
    moveX = dx;
    moveZ = dz;
  }
  if (!t) { moveX *= 0.35; moveZ *= 0.35; } // 指なしはさらに緩やかに
  body.velocity.set(moveX / dt, 0, moveZ / dt);
  body.position.x += moveX;
  body.position.z += moveZ;
  body.position.y = TABLE_Y;
}

let prevPuckSpeed = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 1 / 30);

  if (!gameOver) {
    updateMallet(malletBottomBody, 'bottom', dt);
    updateMallet(malletTopBody, 'top', dt);

    if (puckFrozen) {
      serveTimer -= dt;
      puckBody.position.set(0, TABLE_Y, 0);
      puckBody.velocity.set(0, 0, 0);
      if (serveTimer <= 0) {
        puckFrozen = false;
        const dir = window.__pendingServeDir || 1;
        puckBody.velocity.set((Math.random() - 0.5) * 2, 0, dir * 2.4);
      }
    }

    world.step(1 / 60, dt, 5);
    puckBody.position.y = TABLE_Y;
    puckBody.velocity.y = 0;

    // 衝突音の簡易検知（速度変化ベース）
    const speed = puckBody.velocity.length();
    if (Math.abs(speed - prevPuckSpeed) > 2.2) {
      const nearMalletB = puckBody.position.distanceTo(malletBottomBody.position) < MALLET_R + PUCK_R + 0.05;
      const nearMalletT = puckBody.position.distanceTo(malletTopBody.position) < MALLET_R + PUCK_R + 0.05;
      if (nearMalletB || nearMalletT) {
        playHit(Math.abs(speed - prevPuckSpeed));
      } else {
        playWallBounce();
      }
    }
    prevPuckSpeed = speed;

    // ゴール判定
    if (!puckFrozen) {
      if (puckBody.position.z > GOAL_TRIGGER_Z) onGoal('bottom');
      else if (puckBody.position.z < -GOAL_TRIGGER_Z) onGoal('top');
    }
  }

  // 描画反映
  puckMesh.position.set(puckBody.position.x, puckBody.position.y + PUCK_H / 2, puckBody.position.z);
  puckMesh.quaternion.set(puckBody.quaternion.x, puckBody.quaternion.y, puckBody.quaternion.z, puckBody.quaternion.w);
  malletBottomMesh.position.set(malletBottomBody.position.x, TABLE_Y + MALLET_H / 2, malletBottomBody.position.z);
  malletTopMesh.position.set(malletTopBody.position.x, TABLE_Y + MALLET_H / 2, malletTopBody.position.z);

  renderer.render(scene, camera);
}

/* ========================================================================
   リサイズ対応
   ======================================================================== */
function onResize() {
  const a = window.innerWidth / window.innerHeight;
  camera.left = -viewSize * a;
  camera.right = viewSize * a;
  camera.top = viewSize;
  camera.bottom = -viewSize;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

/* ========================================================================
   Playwright / デバッグ用フック
   ======================================================================== */
window.__game = {
  getScore: () => ({ ...score }),
  getPuckPosition: () => ({ x: puckBody.position.x, z: puckBody.position.z }),
  getMalletPositions: () => ({
    bottom: { x: malletBottomBody.position.x, z: malletBottomBody.position.z },
    top: { x: malletTopBody.position.x, z: malletTopBody.position.z },
  }),
  isGameOver: () => gameOver,
  isPuckFrozen: () => puckFrozen,
  resetGame,
  forceGoal: (player) => onGoal(player),
  setMalletTarget: (player, x, z) => {
    const c = clampMallet(player, x, z);
    touchTargets[player] = { touchId: 'debug', x: c.x, z: c.z };
  },
  clearMalletTarget: (player) => { touchTargets[player] = null; },
};

resetGame();
animate();
</script>
</body>
</html>
