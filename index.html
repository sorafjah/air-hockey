<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2人対戦エアホッケー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:none; user-select:none; -webkit-user-select:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#eef5f2; font-family:'BIZ UDPGothic', sans-serif; }
  #canvas-container { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; }

  .score-panel {
    position:fixed; top:14px;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:8px 18px; border-radius:16px;
    background:rgba(20,26,24,0.62); backdrop-filter:blur(6px);
    z-index:10; pointer-events:none;
  }
  #panel-left { left:14px; }
  #panel-right { right:14px; }
  .score-label { font-size:12px; opacity:0.9; letter-spacing:0.05em; font-weight:700; }
  .score-value { font-size:32px; font-weight:700; min-width:38px; text-align:center; }
  .color-left { color:#34c96e; }
  .color-right { color:#ff8c42; }

  #center-hint {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:rgba(30,50,45,0.2); font-size:12px; letter-spacing:0.3em;
    pointer-events:none; z-index:5; white-space:nowrap;
  }

  #restart-btn {
    position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:20;
    min-width:44px; min-height:44px; padding:0 16px;
    border:none; border-radius:12px;
    background:rgba(20,26,24,0.55); color:#f3faf6;
    font-family:'BIZ UDPGothic', sans-serif; font-size:14px;
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(6px);
  }
  #restart-btn:active { background:rgba(20,26,24,0.75); }

  #overlay {
    position:fixed; inset:0; z-index:30; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:22px;
    background:rgba(10,16,14,0.75); backdrop-filter:blur(4px);
  }
  #overlay.show { display:flex; }
  #win-text { font-size:30px; font-weight:700; text-align:center; }
  #rematch-btn {
    min-width:160px; min-height:52px; padding:0 28px;
    border:none; border-radius:26px; font-size:18px; font-weight:700;
    font-family:'BIZ UDPGothic', sans-serif;
    background:linear-gradient(135deg,#34c96e,#ff8c42); color:#12201b;
  }
  #rematch-btn:active { filter:brightness(0.88); }

  #serve-banner {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    color:#12201b; font-size:20px; font-weight:700; letter-spacing:0.1em;
    z-index:15; pointer-events:none; opacity:0; transition:opacity 0.25s;
    text-shadow:0 2px 10px rgba(255,255,255,0.7);
  }
  #serve-banner.show { opacity:1; }

  #rotate-hint {
    position:fixed; inset:0; z-index:50; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:16px;
    background:#12201b; color:#f3faf6; text-align:center; padding:24px;
  }
  #rotate-hint .icon { font-size:44px; }
  @media (orientation: portrait) {
    #rotate-hint { display:flex; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="rotate-hint">
  <div class="icon">↻</div>
  <div>iPadを横向きにしてください</div>
</div>

<div id="center-hint">FIRST TO 7</div>

<div class="score-panel" id="panel-left">
  <span class="score-label color-left">みどり</span>
  <span class="score-value color-left" id="score-left">0</span>
</div>
<div class="score-panel" id="panel-right">
  <span class="score-label color-right">オレンジ</span>
  <span class="score-value color-right" id="score-right">0</span>
</div>

<div id="serve-banner"></div>

<button id="restart-btn">リスタート</button>

<div id="overlay">
  <div id="win-text">WIN!</div>
  <button id="rematch-btn">もう一回</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';

/* ========================================================================
   設定値
   横長テーブル: ゴールは左右(X軸)、上下(Z軸)は普通の壁のみ
   ======================================================================== */
const TABLE_HALF_X = 5.2;      // X: 左右（ゴール軸）
const TABLE_HALF_Z = 3.3;      // Z: 上下（壁のみ、ゴール無し）
const WALL_T = 0.3;
const WALL_H = 0.32;
const GOAL_HALF_W = 1.3;       // ゴール開口部の半幅（Z方向）
const GOAL_TRIGGER_X = TABLE_HALF_X + 0.55;
const MALLET_R = 0.55;
const MALLET_H = 0.28;
const PUCK_R = 0.36;
const PUCK_H = 0.16;
const TABLE_Y = 0.0;
const MALLET_MAX_SPEED = 14;   // units/sec
const WIN_SCORE = 7;

/* ========================================================================
   Three.js 基本セットアップ
   ======================================================================== */
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeef5f2);
// フラットな見た目にするためフォグは無し

function computeFrustum() {
  const aspect = window.innerWidth / window.innerHeight;
  const halfW = TABLE_HALF_X + 2.0; // 左右の余白込み
  const halfH = TABLE_HALF_Z + 1.4; // 上下の余白込み
  if (aspect >= halfW / halfH) {
    const vh = halfH;
    return { vw: vh * aspect, vh };
  }
  const vw = halfW;
  return { vw, vh: vw / aspect };
}

const { vw: initVW, vh: initVH } = computeFrustum();
const camera = new THREE.OrthographicCamera(-initVW, initVW, initVH, -initVH, 0.1, 50);
camera.up.set(0, 0, -1);
camera.position.set(0, 14, 0.0001);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// ライト（明るめ）
scene.add(new THREE.AmbientLight(0xffffff, 1.1));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
dirLight.position.set(4, 10, -3);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// テーブル面
const tableGeo = new THREE.PlaneGeometry(TABLE_HALF_X * 2, TABLE_HALF_Z * 2, 20, 20);
const tableMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.05 });
const tableMesh = new THREE.Mesh(tableGeo, tableMat);
tableMesh.rotation.x = -Math.PI / 2;
tableMesh.receiveShadow = true;
scene.add(tableMesh);

// センターライン
const centerLineGeo = new THREE.PlaneGeometry(0.05, TABLE_HALF_Z * 2);
const centerLineMat = new THREE.MeshBasicMaterial({ color: 0xc4d6d2 });
const centerLine = new THREE.Mesh(centerLineGeo, centerLineMat);
centerLine.rotation.x = -Math.PI / 2;
centerLine.position.set(0, 0.01, 0);
scene.add(centerLine);

// センターサークル
const circleGeo = new THREE.RingGeometry(1.0, 1.06, 48);
const circleMat = new THREE.MeshBasicMaterial({ color: 0xc4d6d2, side: THREE.DoubleSide });
const centerCircle = new THREE.Mesh(circleGeo, circleMat);
centerCircle.rotation.x = -Math.PI / 2;
centerCircle.position.set(0, 0.011, 0);
scene.add(centerCircle);

// ゴールゾーン表示（左=緑, 右=オレンジ）
function makeGoalZoneMesh(color) {
  const g = new THREE.PlaneGeometry(0.5, GOAL_HALF_W * 2);
  const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.35, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(g, m);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = 0.012;
  return mesh;
}
const goalZoneLeft = makeGoalZoneMesh(0x34c96e);
goalZoneLeft.position.x = -(TABLE_HALF_X - 0.25);
scene.add(goalZoneLeft);
const goalZoneRight = makeGoalZoneMesh(0xff8c42);
goalZoneRight.position.x = TABLE_HALF_X - 0.25;
scene.add(goalZoneRight);

// 壁の見た目（黒っぽかった色を明るいミントに）
function addWallMesh(x, z, w, d) {
  const geo = new THREE.BoxGeometry(w, WALL_H, d);
  const mat = new THREE.MeshStandardMaterial({ color: 0x9fd0c3, roughness: 0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, WALL_H / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
}
// 上下の長辺（ゴール無し）
addWallMesh(0, -(TABLE_HALF_Z + WALL_T / 2), TABLE_HALF_X * 2 + WALL_T * 2, WALL_T);
addWallMesh(0, (TABLE_HALF_Z + WALL_T / 2), TABLE_HALF_X * 2 + WALL_T * 2, WALL_T);
// 左右の短辺（ゴール開口部を残す2分割）
const endSegZ = TABLE_HALF_Z - GOAL_HALF_W;
[1, -1].forEach(sideX => {
  [1, -1].forEach(sideZ => {
    const x = sideX * (TABLE_HALF_X + WALL_T / 2);
    const z = sideZ * (GOAL_HALF_W + endSegZ / 2);
    addWallMesh(x, z, WALL_T, endSegZ);
  });
});

// マレット・パックの見た目
function makeMalletMesh(color) {
  const geo = new THREE.CylinderGeometry(MALLET_R, MALLET_R, MALLET_H, 32);
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.2, emissive: color, emissiveIntensity: 0.15 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}
const malletLeftMesh = makeMalletMesh(0x34c96e);
scene.add(malletLeftMesh);
const malletRightMesh = makeMalletMesh(0xff8c42);
scene.add(malletRightMesh);

const puckGeo = new THREE.CylinderGeometry(PUCK_R, PUCK_R, PUCK_H, 32);
// グレーだったパックを緑/オレンジと喧嘩しない鮮やかなブルーに
const puckMat = new THREE.MeshStandardMaterial({ color: 0x2f8fff, roughness: 0.25, metalness: 0.15, emissive: 0x2f8fff, emissiveIntensity: 0.12 });
const puckMesh = new THREE.Mesh(puckGeo, puckMat);
puckMesh.castShadow = true;
puckMesh.receiveShadow = true;
scene.add(puckMesh);

/* ========================================================================
   cannon-es 物理セットアップ（XZ平面の2D物理として扱う）
   ======================================================================== */
const world = new CANNON.World({ gravity: new CANNON.Vec3(0, 0, 0) });
world.broadphase = new CANNON.SAPBroadphase(world);
world.allowSleep = false;

const puckMaterial = new CANNON.Material('puck');
const malletMaterial = new CANNON.Material('mallet');
const wallMaterial = new CANNON.Material('wall');

world.addContactMaterial(new CANNON.ContactMaterial(puckMaterial, wallMaterial, {
  friction: 0.0, restitution: 0.92,
}));
world.addContactMaterial(new CANNON.ContactMaterial(puckMaterial, malletMaterial, {
  friction: 0.0, restitution: 0.95,
}));

function addWallBody(x, z, w, d) {
  const body = new CANNON.Body({ mass: 0, material: wallMaterial });
  body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, WALL_H, d / 2)));
  body.position.set(x, TABLE_Y, z);
  world.addBody(body);
}
addWallBody(0, -(TABLE_HALF_Z + WALL_T / 2), TABLE_HALF_X * 2 + WALL_T * 2, WALL_T);
addWallBody(0, (TABLE_HALF_Z + WALL_T / 2), TABLE_HALF_X * 2 + WALL_T * 2, WALL_T);
[1, -1].forEach(sideX => {
  [1, -1].forEach(sideZ => {
    const x = sideX * (TABLE_HALF_X + WALL_T / 2);
    const z = sideZ * (GOAL_HALF_W + endSegZ / 2);
    addWallBody(x, z, WALL_T, endSegZ);
  });
});

// パック
const puckBody = new CANNON.Body({
  mass: 0.17,
  material: puckMaterial,
  linearDamping: 0.06,
  angularDamping: 0.9,
});
puckBody.addShape(new CANNON.Cylinder(PUCK_R, PUCK_R, PUCK_H, 20));
puckBody.position.set(0, TABLE_Y, 0);
// XZ平面上を滑るだけの2D的な動きに固定（縦に倒れたりしない）
puckBody.angularFactor.set(0, 1, 0);
puckBody.linearFactor.set(1, 0, 1);
world.addBody(puckBody);

// マレット（キネマティック：タッチで直接動かす）
function makeMalletBody() {
  const body = new CANNON.Body({
    mass: 0,
    type: CANNON.Body.KINEMATIC,
    material: malletMaterial,
  });
  body.addShape(new CANNON.Cylinder(MALLET_R, MALLET_R, MALLET_H, 20));
  body.position.set(0, TABLE_Y, 0);
  world.addBody(body);
  return body;
}
const malletLeftBody = makeMalletBody();
malletLeftBody.position.set(-(TABLE_HALF_X - 1.0), TABLE_Y, 0);
const malletRightBody = makeMalletBody();
malletRightBody.position.set((TABLE_HALF_X - 1.0), TABLE_Y, 0);

/* ========================================================================
   Web Audio（効果音）
   ======================================================================== */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type, gainPeak, delay = 0) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  const t0 = audioCtx.currentTime + delay;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(gainPeak, t0 + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}
function playHit(intensity) {
  const f = 260 + Math.min(intensity, 12) * 22;
  playTone(f, 0.09, 'triangle', Math.min(0.25 + intensity * 0.02, 0.5));
}
function playWallBounce() {
  playTone(180, 0.05, 'square', 0.12);
}
function playGoal() {
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.22, 'sine', 0.3, i * 0.09));
}
function playWin() {
  [784, 659, 880, 1175].forEach((f, i) => playTone(f, 0.3, 'sine', 0.32, i * 0.13));
}

/* ========================================================================
   タッチ操作（画面左半分/右半分 で振り分け）
   世界座標: X- = 画面左側(LEFT), X+ = 画面右側(RIGHT)
   ======================================================================== */
const raycaster = new THREE.Raycaster();
const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -TABLE_Y);
const touchTargets = { left: null, right: null }; // {touchId, worldX, worldZ}

function screenToWorld(clientX, clientY) {
  const ndc = new THREE.Vector2(
    (clientX / window.innerWidth) * 2 - 1,
    -(clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  const hit = new THREE.Vector3();
  raycaster.ray.intersectPlane(tablePlane, hit);
  return hit;
}

function clampMallet(player, x, z) {
  const cz = Math.max(-(TABLE_HALF_Z - MALLET_R), Math.min(TABLE_HALF_Z - MALLET_R, z));
  let cx;
  if (player === 'left') {
    cx = Math.max(-(TABLE_HALF_X - MALLET_R), Math.min(-MALLET_R * 0.5, x));
  } else {
    cx = Math.min((TABLE_HALF_X - MALLET_R), Math.max(MALLET_R * 0.5, x));
  }
  return { x: cx, z: cz };
}

// 指がマレットの真上に乗って隠れてしまわないよう、タッチ位置から
// フィールド中央方向へ少しずらした位置をマレットの中心にする
// （指はマレットの「外側の端」に触れる形になり、丸い本体が指の先に見える）
const TOUCH_OFFSET_X = MALLET_R * 1.6;

function handleTouchPoint(clientX, clientY, touchId, phase) {
  const player = clientX < window.innerWidth / 2 ? 'left' : 'right';
  if (phase === 'start' || phase === 'move') {
    const world = screenToWorld(clientX, clientY);
    const offsetX = player === 'left' ? TOUCH_OFFSET_X : -TOUCH_OFFSET_X;
    const c = clampMallet(player, world.x + offsetX, world.z);
    touchTargets[player] = { touchId, x: c.x, z: c.z };
  } else if (phase === 'end') {
    if (touchTargets[player] && touchTargets[player].touchId === touchId) {
      touchTargets[player] = null;
    }
  }
}

function onTouchStart(e) {
  ensureAudio();
  for (const t of e.changedTouches) handleTouchPoint(t.clientX, t.clientY, t.identifier, 'start');
}
function onTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) handleTouchPoint(t.clientX, t.clientY, t.identifier, 'move');
}
function onTouchEnd(e) {
  for (const t of e.changedTouches) handleTouchPoint(t.clientX, t.clientY, t.identifier, 'end');
}
renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: true });
renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: true });
renderer.domElement.addEventListener('touchcancel', onTouchEnd, { passive: true });

// マウス操作（PCでのテスト用フォールバック）
let mouseDown = false;
renderer.domElement.addEventListener('mousedown', (e) => {
  ensureAudio();
  mouseDown = true;
  handleTouchPoint(e.clientX, e.clientY, 'mouse', 'start');
});
window.addEventListener('mousemove', (e) => {
  if (mouseDown) handleTouchPoint(e.clientX, e.clientY, 'mouse', 'move');
});
window.addEventListener('mouseup', (e) => {
  mouseDown = false;
  handleTouchPoint(e.clientX, e.clientY, 'mouse', 'end');
});

// ダブルタップズーム防止
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });
document.addEventListener('gesturestart', (e) => e.preventDefault());

/* ========================================================================
   ゲーム状態
   ======================================================================== */
const scoreEl = { left: document.getElementById('score-left'), right: document.getElementById('score-right') };
const overlay = document.getElementById('overlay');
const winTextEl = document.getElementById('win-text');
const serveBanner = document.getElementById('serve-banner');

let score = { left: 0, right: 0 };
let gameOver = false;
let puckFrozen = true;
let serveTimer = 0;

function showServeBanner(text, ms) {
  serveBanner.textContent = text;
  serveBanner.classList.add('show');
  setTimeout(() => serveBanner.classList.remove('show'), ms);
}

function resetPuck(directionSign) {
  puckBody.position.set(0, TABLE_Y, 0);
  puckBody.velocity.set(0, 0, 0);
  puckBody.angularVelocity.set(0, 0, 0);
  puckFrozen = true;
  serveTimer = 0.9;
  window.__pendingServeDir = directionSign;
}

function resetGame() {
  score = { left: 0, right: 0 };
  gameOver = false;
  overlay.classList.remove('show');
  scoreEl.left.textContent = '0';
  scoreEl.right.textContent = '0';
  malletLeftBody.position.set(-(TABLE_HALF_X - 1.0), TABLE_Y, 0);
  malletRightBody.position.set((TABLE_HALF_X - 1.0), TABLE_Y, 0);
  resetPuck(Math.random() < 0.5 ? 1 : -1);
  showServeBanner('スタート！', 1200);
}

// puckがどちら側のゴールを割ったか(golfSide)から、得点するプレイヤーを決める
function onGoal(conceivedSide) {
  const scoringPlayer = conceivedSide === 'left' ? 'right' : 'left';
  score[scoringPlayer]++;
  scoreEl[scoringPlayer].textContent = String(score[scoringPlayer]);
  playGoal();
  if (score[scoringPlayer] >= WIN_SCORE) {
    gameOver = true;
    winTextEl.textContent = (scoringPlayer === 'left' ? 'みどり' : 'オレンジ') + ' の勝ち！';
    winTextEl.style.color = scoringPlayer === 'left' ? '#34c96e' : '#ff8c42';
    overlay.classList.add('show');
    playWin();
  } else {
    // 失点した側にサーブ権
    resetPuck(conceivedSide === 'left' ? -1 : 1);
    showServeBanner((scoringPlayer === 'left' ? 'みどり' : 'オレンジ') + ' の得点！', 1100);
  }
}

document.getElementById('restart-btn').addEventListener('click', resetGame);
document.getElementById('rematch-btn').addEventListener('click', resetGame);

/* ========================================================================
   メインループ
   ======================================================================== */
const clock = new THREE.Clock();

function updateMallet(body, player, dt) {
  // キネマティックボディは velocity をセットするだけで world.step() が
  // 位置を積分してくれる。position を直接動かすと二重に移動して暴走する。
  const t = touchTargets[player];
  if (!t) {
    body.velocity.set(0, 0, 0);
    return;
  }
  const dx = t.x - body.position.x;
  const dz = t.z - body.position.z;
  const dist = Math.sqrt(dx * dx + dz * dz);
  if (dist < 0.001) {
    body.velocity.set(0, 0, 0);
    return;
  }
  const speed = Math.min(dist / dt, MALLET_MAX_SPEED);
  body.velocity.set((dx / dist) * speed, 0, (dz / dist) * speed);
}

let prevPuckSpeed = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 1 / 30);

  if (!gameOver) {
    updateMallet(malletLeftBody, 'left', dt);
    updateMallet(malletRightBody, 'right', dt);

    if (puckFrozen) {
      serveTimer -= dt;
      puckBody.position.set(0, TABLE_Y, 0);
      puckBody.velocity.set(0, 0, 0);
      if (serveTimer <= 0) {
        puckFrozen = false;
        const dir = window.__pendingServeDir || 1;
        puckBody.velocity.set(dir * 2.4, 0, (Math.random() - 0.5) * 2);
      }
    }

    world.step(1 / 60, dt, 5);
    puckBody.position.y = TABLE_Y;
    puckBody.velocity.y = 0;

    // 念のためマレットをゾーン内・テーブル面上に固定
    const cl = clampMallet('left', malletLeftBody.position.x, malletLeftBody.position.z);
    malletLeftBody.position.set(cl.x, TABLE_Y, cl.z);
    const cr = clampMallet('right', malletRightBody.position.x, malletRightBody.position.z);
    malletRightBody.position.set(cr.x, TABLE_Y, cr.z);

    // 衝突音の簡易検知（速度変化ベース）
    const speed = puckBody.velocity.length();
    if (Math.abs(speed - prevPuckSpeed) > 2.2) {
      const nearMalletL = puckBody.position.distanceTo(malletLeftBody.position) < MALLET_R + PUCK_R + 0.05;
      const nearMalletR = puckBody.position.distanceTo(malletRightBody.position) < MALLET_R + PUCK_R + 0.05;
      if (nearMalletL || nearMalletR) {
        playHit(Math.abs(speed - prevPuckSpeed));
      } else {
        playWallBounce();
      }
    }
    prevPuckSpeed = speed;

    // ゴール判定（Xが右端を超えたら右ゴール = leftの得点、左端を超えたら左ゴール = rightの得点）
    if (!puckFrozen) {
      if (puckBody.position.x > GOAL_TRIGGER_X) onGoal('right');
      else if (puckBody.position.x < -GOAL_TRIGGER_X) onGoal('left');
    }
  }

  // 描画反映
  puckMesh.position.set(puckBody.position.x, puckBody.position.y + PUCK_H / 2, puckBody.position.z);
  puckMesh.quaternion.set(puckBody.quaternion.x, puckBody.quaternion.y, puckBody.quaternion.z, puckBody.quaternion.w);
  malletLeftMesh.position.set(malletLeftBody.position.x, TABLE_Y + MALLET_H / 2, malletLeftBody.position.z);
  malletRightMesh.position.set(malletRightBody.position.x, TABLE_Y + MALLET_H / 2, malletRightBody.position.z);

  renderer.render(scene, camera);
}

/* ========================================================================
   リサイズ対応
   ======================================================================== */
function onResize() {
  const { vw, vh } = computeFrustum();
  camera.left = -vw;
  camera.right = vw;
  camera.top = vh;
  camera.bottom = -vh;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 200));

// 横向きロックを試みる（対応ブラウザのみ・失敗しても無視）
try {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
} catch (e) { /* 未対応ブラウザは無視 */ }

/* ========================================================================
   Playwright / デバッグ用フック
   ======================================================================== */
window.__game = {
  getScore: () => ({ ...score }),
  getPuckPosition: () => ({ x: puckBody.position.x, z: puckBody.position.z }),
  getMalletPositions: () => ({
    left: { x: malletLeftBody.position.x, z: malletLeftBody.position.z },
    right: { x: malletRightBody.position.x, z: malletRightBody.position.z },
  }),
  isGameOver: () => gameOver,
  isPuckFrozen: () => puckFrozen,
  resetGame,
  forceGoal: (conceivedSide) => onGoal(conceivedSide),
  setMalletTarget: (player, x, z) => {
    const c = clampMallet(player, x, z);
    touchTargets[player] = { touchId: 'debug', x: c.x, z: c.z };
  },
  clearMalletTarget: (player) => { touchTargets[player] = null; },
};

resetGame();
animate();
</script>
